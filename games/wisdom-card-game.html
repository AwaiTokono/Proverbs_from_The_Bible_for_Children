<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知識vs知恵 カードゲーム</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1b2a;--bg2:#132035;--blue:#4db8ff;--blue-glow:rgba(77,184,255,0.25);--gold:#ffd166;--gold-glow:rgba(255,209,102,0.3);--green:#06d6a0;--green-glow:rgba(6,214,160,0.3);--red:#ef476f;--red-glow:rgba(239,71,111,0.3);--purple:#b388ff;--white:#f0f8ff;--text-soft:#7aa0c0;--card-w:160px;--card-h:220px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}html{font-size:16px;}
body{font-family:'M PLUS Rounded 1c','Noto Sans JP',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;overflow-x:hidden;user-select:none;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 15% 20%,rgba(255,255,255,0.6) 0%,transparent 100%),radial-gradient(1px 1px at 40% 60%,rgba(255,255,255,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 70% 10%,rgba(255,255,255,0.5) 0%,transparent 100%),radial-gradient(2px 2px at 10% 50%,rgba(77,184,255,0.4) 0%,transparent 100%),radial-gradient(2px 2px at 60% 80%,rgba(255,209,102,0.3) 0%,transparent 100%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:24px 16px 60px;}
.back-nav{text-align:center;margin-bottom:20px;}
.back-btn{display:inline-block;background:rgba(77,184,255,0.1);border:1px solid rgba(77,184,255,0.3);color:var(--blue);font-family:'M PLUS Rounded 1c',sans-serif;font-size:0.82rem;font-weight:800;padding:8px 20px;border-radius:100px;text-decoration:none;transition:background 0.2s;}
.back-btn:hover{background:rgba(77,184,255,0.2);}
.title-area{text-align:center;margin-bottom:24px;}
.game-badge{display:inline-block;background:linear-gradient(135deg,var(--blue),var(--purple));font-size:0.7rem;font-weight:800;letter-spacing:0.14em;padding:5px 16px;border-radius:100px;margin-bottom:10px;box-shadow:0 0 12px var(--blue-glow);}
.game-title{font-size:clamp(1.4rem,5vw,2rem);font-weight:900;line-height:1.3;background:linear-gradient(135deg,var(--blue) 0%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.game-desc{font-size:0.85rem;color:var(--text-soft);font-weight:700;}
.scorebar{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border:1px solid rgba(77,184,255,0.2);border-radius:16px;padding:14px 20px;margin-bottom:20px;gap:12px;}
.score-item{text-align:center;flex:1;}
.score-label{font-size:0.65rem;font-weight:800;letter-spacing:0.1em;color:var(--text-soft);margin-bottom:4px;}
.score-val{font-size:1.6rem;font-weight:900;line-height:1;}
.score-val.blue{color:var(--blue);text-shadow:0 0 12px var(--blue-glow);}
.score-val.gold{color:var(--gold);text-shadow:0 0 12px var(--gold-glow);}
.score-val.green{color:var(--green);text-shadow:0 0 12px var(--green-glow);}
.score-divider{width:1px;height:40px;background:rgba(77,184,255,0.2);}
.phase-bar{text-align:center;margin-bottom:20px;min-height:28px;}
.phase-text{font-size:0.95rem;font-weight:800;color:var(--gold);letter-spacing:0.06em;animation:fadeIn 0.4s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;justify-items:center;}
.card{width:100%;max-width:var(--card-w);aspect-ratio:2/3;perspective:800px;cursor:pointer;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);border-radius:14px;}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 8px;text-align:center;}
.card-back{background:linear-gradient(135deg,#1a3050 0%,#0d1b2a 100%);border:2px solid rgba(77,184,255,0.3);box-shadow:0 4px 16px rgba(0,0,0,0.4),inset 0 0 20px rgba(77,184,255,0.05);}
.card-back-pattern{font-size:2.2rem;opacity:0.5;margin-bottom:6px;}
.card-back-label{font-size:0.6rem;font-weight:800;letter-spacing:0.12em;color:var(--blue);opacity:0.7;}
.card-front{transform:rotateY(180deg);flex-direction:column;gap:6px;}
.card-front.knowledge{background:linear-gradient(135deg,#1a1040 0%,#2d1b69 100%);border:2px solid var(--purple);box-shadow:0 4px 20px rgba(179,136,255,0.3);}
.card-front.wisdom{background:linear-gradient(135deg,#0a2a20 0%,#0d3d2a 100%);border:2px solid var(--green);box-shadow:0 4px 20px var(--green-glow);}
.card-type-badge{font-size:0.55rem;font-weight:800;letter-spacing:0.1em;padding:3px 8px;border-radius:100px;margin-bottom:2px;}
.knowledge .card-type-badge{background:rgba(179,136,255,0.2);color:var(--purple);border:1px solid rgba(179,136,255,0.4);}
.wisdom .card-type-badge{background:rgba(6,214,160,0.15);color:var(--green);border:1px solid rgba(6,214,160,0.4);}
.card-emoji{font-size:2rem;line-height:1;margin:4px 0;}
.card-text{font-size:0.7rem;font-weight:700;line-height:1.5;color:var(--white);opacity:0.9;}
.card.matched .card-front{animation:matchPulse 0.5s ease;}
@keyframes matchPulse{0%{transform:rotateY(180deg) scale(1);}50%{transform:rotateY(180deg) scale(1.08);}100%{transform:rotateY(180deg) scale(1);}}
.card.matched .card-inner{opacity:0.6;}
.card:not(.flipped):not(.matched):hover .card-inner{transform:translateY(-4px) rotateY(8deg);box-shadow:0 8px 24px rgba(77,184,255,0.2);}
.btn-area{text-align:center;margin-top:8px;}
.btn{display:inline-block;background:linear-gradient(135deg,var(--blue) 0%,var(--purple) 100%);color:var(--bg);font-family:'M PLUS Rounded 1c',sans-serif;font-size:1rem;font-weight:900;padding:14px 36px;border-radius:100px;border:none;cursor:pointer;box-shadow:0 4px 20px var(--blue-glow);transition:transform 0.2s,box-shadow 0.2s;letter-spacing:0.06em;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--blue-glow);}.btn:active{transform:translateY(0);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.show{display:flex;}
.modal{background:var(--bg2);border:2px solid var(--gold);border-radius:28px;padding:40px 32px;text-align:center;max-width:340px;width:90%;box-shadow:0 0 60px var(--gold-glow),0 20px 60px rgba(0,0,0,0.5);animation:modalPop 0.4s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes modalPop{from{opacity:0;transform:scale(0.7);}to{opacity:1;transform:scale(1);}}
.modal-emoji{font-size:3.5rem;margin-bottom:12px;display:block;}
.modal-title{font-size:1.6rem;font-weight:900;color:var(--gold);text-shadow:0 0 20px var(--gold-glow);margin-bottom:10px;}
.modal-msg{font-size:0.9rem;color:var(--text-soft);line-height:1.8;margin-bottom:24px;font-weight:700;}
.modal-score{font-size:1rem;font-weight:800;color:var(--white);background:rgba(255,209,102,0.1);border:1px solid rgba(255,209,102,0.3);border-radius:12px;padding:12px 20px;margin-bottom:24px;}
.flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);font-size:1.6rem;font-weight:900;padding:16px 32px;border-radius:20px;z-index:200;pointer-events:none;opacity:0;transition:opacity 0.2s,transform 0.2s;white-space:nowrap;}
.flash.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.flash.match{background:rgba(6,214,160,0.15);border:2px solid var(--green);color:var(--green);box-shadow:0 0 40px var(--green-glow);}
.flash.miss{background:rgba(239,71,111,0.15);border:2px solid var(--red);color:var(--red);box-shadow:0 0 40px var(--red-glow);}
.rule-box{background:rgba(77,184,255,0.06);border:1px solid rgba(77,184,255,0.15);border-radius:14px;padding:14px 18px;margin-bottom:20px;font-size:0.78rem;color:var(--text-soft);font-weight:700;line-height:1.8;}
.rule-box strong{color:var(--blue);}
@media(max-width:480px){.card-grid{grid-template-columns:repeat(4,1fr);gap:6px;}:root{--card-w:130px;}.card-emoji{font-size:1.6rem;}.card-text{font-size:0.62rem;}}
</style>
</head>
<body>
<div class="wrap">
<div class="back-nav">
  <a href="../index.html" class="back-btn">← 第一部に戻る</a>
</div>
<div class="title-area">
  <div class="game-badge">📖 箴言1章より</div>
  <h1 class="game-title">🃏 知識 vs 知恵<br>カードめくりゲーム</h1>
  <p class="game-desc">同じペアのカードを見つけよう！</p>
</div>
<div class="rule-box">
  <strong>あそびかた：</strong>カードをめくって、<strong>同じペア</strong>（知識カード＋知識カード、または知恵カード＋知恵カード）を見つけよう。<br>
  全部で <strong>8ペア</strong>。ミスを少なくクリアしよう！
</div>
<div class="scorebar">
  <div class="score-item"><div class="score-label">⭐ ペア</div><div class="score-val gold" id="pairs">0 / 8</div></div>
  <div class="score-divider"></div>
  <div class="score-item"><div class="score-label">🔄 めくった回数</div><div class="score-val blue" id="moves">0</div></div>
  <div class="score-divider"></div>
  <div class="score-item"><div class="score-label">❌ ミス</div><div class="score-val green" id="misses">0</div></div>
</div>
<div class="phase-bar"><div class="phase-text" id="phase-text">カードをめくってスタート！</div></div>
<div class="card-grid" id="grid"></div>
<div class="btn-area"><button class="btn" onclick="initGame()">🔀 シャッフルしてはじめる</button></div>
</div>
<div class="flash" id="flash"></div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <span class="modal-emoji">🎉</span>
    <div class="modal-title">クリア！</div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-score" id="modal-score"></div>
    <button class="btn" onclick="closeModal()">もう一度あそぶ</button>
  </div>
</div>
<script>
const CARD_DATA=[
  {id:'k1',type:'knowledge',emoji:'📚',text:'魚の名前を\n100種類知っている'},
  {id:'k2',type:'knowledge',emoji:'🔢',text:'九九を\n全部言える'},
  {id:'k3',type:'knowledge',emoji:'🌍',text:'国の名前を\nたくさん知っている'},
  {id:'k4',type:'knowledge',emoji:'📖',text:'聖書の言葉を\n暗記している'},
  {id:'w1',type:'wisdom',emoji:'🤝',text:'悲しむ友だちに\n声をかける'},
  {id:'w2',type:'wisdom',emoji:'😊',text:'宿題を忘れたことを\n正直に話す'},
  {id:'w3',type:'wisdom',emoji:'✋',text:'悪口を聞いても\n一緒に言わない'},
  {id:'w4',type:'wisdom',emoji:'🙏',text:'神さまが\n喜ばれることを選ぶ'},
];
function makeCards(){const c=[];CARD_DATA.forEach(d=>{c.push({...d,uid:d.id+'_a'});c.push({...d,uid:d.id+'_b'});});return shuffle(c);}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let cards=[],flipped=[],matched=new Set(),moves=0,misses=0,locked=false;
function initGame(){cards=makeCards();flipped=[];matched=new Set();moves=0;misses=0;locked=false;updateScore();setPhase('カードをめくってスタート！');renderGrid();document.getElementById('modal').classList.remove('show');}
function renderGrid(){const grid=document.getElementById('grid');grid.innerHTML='';cards.forEach(card=>{const el=document.createElement('div');el.className='card';el.dataset.uid=card.uid;el.innerHTML=`<div class="card-inner"><div class="card-face card-back"><div class="card-back-pattern">✦</div><div class="card-back-label">WISDOM</div></div><div class="card-face card-front ${card.type}"><div class="card-type-badge">${card.type==='knowledge'?'知 識':'知 恵'}</div><div class="card-emoji">${card.emoji}</div><div class="card-text">${card.text.replace('\n','<br>')}</div></div></div>`;el.addEventListener('click',()=>onCardClick(el,card));grid.appendChild(el);});}
function onCardClick(el,card){if(locked)return;if(matched.has(card.id))return;if(flipped.find(f=>f.uid===card.uid))return;if(flipped.length>=2)return;el.classList.add('flipped');flipped.push({uid:card.uid,id:card.id,el});if(flipped.length===2){moves++;updateScore();locked=true;const[a,b]=flipped;if(a.id===b.id){setTimeout(()=>{a.el.classList.add('matched');b.el.classList.add('matched');matched.add(a.id);flipped=[];locked=false;updateScore();showFlash('✨ ペア！','match');setPhase(getMatchPhase(a.id));if(matched.size===CARD_DATA.length){setTimeout(showClear,800);}},500);}else{misses++;updateScore();showFlash('💦 ちがう…','miss');setTimeout(()=>{a.el.classList.remove('flipped');b.el.classList.remove('flipped');flipped=[];locked=false;setPhase('もう一度チャレンジ！');},900);}}}
const MATCH_MSGS={k1:'魚の名前を100種類知っている → これは知識！',k2:'九九を全部言える → これは知識！',k3:'国の名前をたくさん知っている → これは知識！',k4:'聖書の言葉を暗記している → これは知識！',w1:'悲しむ友だちに声をかける → これが知恵！',w2:'正直に話す → これが知恵！',w3:'悪口を一緒に言わない → これが知恵！',w4:'神さまが喜ばれることを選ぶ → これが知恵！'};
function getMatchPhase(id){return MATCH_MSGS[id]||'ペアを見つけた！';}
function updateScore(){document.getElementById('pairs').textContent=`${matched.size} / 8`;document.getElementById('moves').textContent=moves;document.getElementById('misses').textContent=misses;}
function setPhase(txt){const el=document.getElementById('phase-text');el.textContent=txt;el.style.animation='none';requestAnimationFrame(()=>{el.style.animation='fadeIn 0.4s ease';});}
let flashTimer=null;
function showFlash(msg,type){const el=document.getElementById('flash');el.textContent=msg;el.className=`flash ${type} show`;if(flashTimer)clearTimeout(flashTimer);flashTimer=setTimeout(()=>{el.classList.remove('show');},900);}
function showClear(){const rank=misses===0?'⭐⭐⭐ パーフェクト！':misses<=3?'⭐⭐ すごい！':misses<=6?'⭐ よくできました！':'クリア！';const msg=misses===0?'一度もミスなし！神さまの知恵をよく知っているね！':`ミス${misses}回でクリア！練習すればもっと上手になれるよ！`;document.getElementById('modal-msg').textContent=msg;document.getElementById('modal-score').innerHTML=`${rank}<br>めくった回数：${moves}回 ミス：${misses}回`;document.getElementById('modal').classList.add('show');setPhase('🎉 全ペアクリア！おめでとう！');}
function closeModal(){document.getElementById('modal').classList.remove('show');initGame();}
initGame();
</script>
</body>
</html>
